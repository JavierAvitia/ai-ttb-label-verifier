name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  # Allows manual triggers from the Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Sync to Hugging Face
        uses: huggingface/hub-sync@v1
        with:
          github_repo_id: javieravitia/ai-ttb-label-verifier
          huggingface_repo_id: javieravitia/ai-ttb-label-verifier
          hf_token: ${{ secrets.HF_TOKEN }}
